name: Update Games Data

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

# Opt into Node.js 24 now; GitHub forces it on 2026-06-02 and removes Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch latest games data from Roblox API
        run: node scripts/update-games-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet games-data.json && echo "No changes" && exit 0
          git add games-data.json
          git commit -m "Update games data (automated)"
          git push
