name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # Also redeploy after the hourly data update finishes. Commits pushed by the
  # github-actions bot don't trigger a `push` run (anti-recursion), so without this
  # the deployed games-data.json would stay frozen at the last manual push.
  workflow_run:
    workflows: ["Update Games Data"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
